<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Lever Laboratory - Multiplayer</title>
    <style>
        /* --- CORE STYLES --- */
        body { margin: 0; padding: 0; background: #0f172a; display: flex; flex-direction: column; align-items: center; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        #game-container { position: relative; width: 800px; max-width: 100vw; height: 600px; max-height: 100vh; border: 4px solid #3b82f6; border-radius: 8px; overflow: hidden; background: #1e293b; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }
        
        /* --- UI OVERLAYS --- */
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        #start-screen h1 { font-size: 32px; color: #60a5fa; margin-bottom: 10px; }
        #start-screen input { padding: 10px; font-size: 16px; border-radius: 5px; border: none; margin-bottom: 10px; width: 200px; text-align: center; }
        .btn { background: #3b82f6; color: white; padding: 10px 20px; font-size: 16px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 5px; transition: 0.2s; }
        .btn:hover { background: #2563eb; }
        .btn-teacher { background: #d97706; }
        .btn-teacher:hover { background: #b45309; }

        /* --- CHAT SYSTEMS --- */
        .chat-container { position: absolute; background: rgba(0,0,0,0.7); border-radius: 8px; display: flex; flex-direction: column; padding: 10px; box-sizing: border-box; }
        #global-chat { bottom: 10px; left: 10px; width: 300px; height: 200px; border: 1px solid #475569; z-index: 10; }
        .chat-messages { flex-grow: 1; overflow-y: auto; margin-bottom: 10px; font-size: 13px; display: flex; flex-direction: column; gap: 4px; }
        .chat-messages span { background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 4px; }
        .chat-input-row { display: flex; gap: 5px; }
        .chat-input-row input { flex-grow: 1; padding: 5px; border: none; border-radius: 4px; }
        .chat-input-row button { background: #10b981; border: none; color: white; border-radius: 4px; cursor: pointer; padding: 0 10px; }

        /* --- THE SANDBOX MODAL --- */
        #sandbox-modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 700px; height: 500px; background: #1e293b; border: 4px solid #64748b; border-radius: 12px; z-index: 50; display: none; flex-direction: row; box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
        #sandbox-area { flex: 2; padding: 20px; position: relative; }
        #sandbox-chat { flex: 1; border-left: 2px solid #334155; padding: 10px; display: flex; flex-direction: column; background: #0f172a; border-radius: 0 8px 8px 0; }
        #sandbox-canvas { width: 100%; height: 250px; background: #0f172a; border-radius: 8px; border: 2px solid #475569; margin-top: 20px; cursor: grab; }
        .close-btn { position: absolute; top: 10px; right: 10px; background: #ef4444; border: none; color: white; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-weight: bold; }
        
        /* --- MOBILE CONTROLS --- */
        #mobile-controls { display: none; position: absolute; bottom: 20px; right: 20px; z-index: 20; }
        .d-pad { display: grid; grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); gap: 5px; }
        .m-btn { background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.4); color: white; border-radius: 50%; font-size: 20px; display: flex; align-items: center; justify-content: center; user-select: none; }
        .m-btn:active { background: rgba(255,255,255,0.5); }
        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 3; }
        #btn-action { grid-column: 2; grid-row: 2; background: rgba(59, 130, 246, 0.5); font-size: 12px; border-radius: 10px; }
        
        @media (max-width: 768px) { #mobile-controls { display: block; } #global-chat { width: 200px; height: 150px; } }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>

        <div class="chat-container" id="global-chat">
            <div style="font-size: 12px; color: #94a3b8; font-weight: bold; margin-bottom: 5px;">Global Lab Chat</div>
            <div class="chat-messages" id="global-messages"></div>
            <div class="chat-input-row">
                <input type="text" id="global-input" placeholder="Say hello..." maxlength="60">
                <button onclick="sendGlobalChat()">Send</button>
            </div>
        </div>

        <div id="mobile-controls">
            <div class="d-pad">
                <div class="m-btn" id="btn-up">▲</div>
                <div class="m-btn" id="btn-left">◀</div>
                <div class="m-btn" id="btn-action">ACT</div>
                <div class="m-btn" id="btn-right">▶</div>
                <div class="m-btn" id="btn-down">▼</div>
            </div>
        </div>

        <div id="sandbox-modal">
            <button class="close-btn" onclick="closeSandbox()">X</button>
            <div id="sandbox-area">
                <h2 style="margin: 0; color: #38bdf8;">Manipulative Sandbox</h2>
                <p style="margin: 5px 0 0 0; font-size: 14px; color: #cbd5e1;">Drag the Fulcrum (▲), Load (⬛), and Effort (✋) to build different classes of levers.</p>
                
                <canvas id="sandbox-canvas" width="450" height="250"></canvas>
                
                <div id="sandbox-feedback" style="margin-top: 15px; font-size: 18px; font-weight: bold; color: #10b981;">
                    Build a lever to see its class!
                </div>
                <div id="sandbox-advantage" style="margin-top: 5px; font-size: 14px; color: #fbbf24;"></div>
            </div>
            <div id="sandbox-chat">
                <div style="font-size: 14px; color: #94a3b8; font-weight: bold; margin-bottom: 5px;">Workbench Chat</div>
                <div class="chat-messages" id="local-messages"></div>
                <div class="chat-input-row">
                    <input type="text" id="local-input" placeholder="Discuss..." maxlength="60">
                    <button onclick="sendLocalChat()">Send</button>
                </div>
            </div>
        </div>

        <div id="start-screen">
            <h1>The Lever Laboratory</h1>
            <p style="margin-bottom: 20px; color: #94a3b8;">Explore, balance, and learn together.</p>
            <input type="text" id="player-name-input" placeholder="Enter your name..." maxlength="12">
            <div style="display: flex; gap: 10px;">
                <button class="btn" onclick="startGame('student')">Join as Student</button>
                <button class="btn btn-teacher" onclick="checkTeacherLogin()">Join as Teacher</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getDatabase, ref, set, onValue, push, onDisconnect, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBXgT_LxFUar6FcfFqKJsuY2YIOjG5JLtM",
            authDomain: "symmetry-and-nets.firebaseapp.com",
            databaseURL: "https://symmetry-and-nets-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "symmetry-and-nets",
            storageBucket: "symmetry-and-nets.firebasestorage.app",
            messagingSenderId: "250211420064",
            appId: "1:250211420064:web:fe4a064715042bedf546c5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // --- CORE GAME VARIABLES ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameActive = false;
        let myUid = null;
        let players = {};
        
        let localPlayer = {
            x: 400, y: 500, width: 30, height: 30, speed: 4, name: "Student", role: "student", color: "#3b82f6"
        };
        let keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, w: false, a: false, s: false, d: false };

        // --- THE ENVIRONMENT (Stations & Seesaw) ---
        const workbenches = [
            { id: "bench1", x: 100, y: 100, width: 80, height: 60, color: "#8b5cf6", label: "Workbench A" },
            { id: "bench2", x: 620, y: 100, width: 80, height: 60, color: "#ec4899", label: "Workbench B" },
            { id: "bench3", x: 100, y: 400, width: 80, height: 60, color: "#14b8a6", label: "Workbench C" }
        ];

        // The Giant Group Seesaw in the middle of the room
        const giantSeesaw = {
            fulcrumX: 400, fulcrumY: 300, length: 400, width: 60, tiltAngle: 0
        };

        // --- INITIALIZATION & AUTH ---
        window.checkTeacherLogin = function() {
            const pass = prompt("Enter Teacher Password (hint: IWS):");
            if(pass === "IWS") startGame('teacher');
            else alert("Incorrect password.");
        };

        window.startGame = function(role) {
            let nameInput = document.getElementById('player-name-input').value.trim();
            if (nameInput !== "") localPlayer.name = nameInput;
            localPlayer.role = role;
            if(role === 'teacher') localPlayer.color = "#fbbf24"; // Gold for teacher

            document.getElementById('start-screen').style.display = 'none';
            
            signInAnonymously(auth).then(() => {
                myUid = auth.currentUser.uid;
                const myRef = ref(db, `learningLibrary/players/${myUid}`);
                
                // Set initial position
                set(myRef, localPlayer);
                onDisconnect(myRef).remove(); // Delete avatar when window closes

                // Listen for all players
                onValue(ref(db, 'learningLibrary/players'), (snapshot) => {
                    players = snapshot.val() || {};
                });

                // Listen for Global Chat
                onValue(ref(db, 'learningLibrary/boards/global'), (snapshot) => {
                    renderChat('global-messages', snapshot.val());
                });

                gameActive = true;
                gameLoop();
            });
        };

        // --- CHAT FUNCTIONS ---
        window.sendGlobalChat = function() {
            const input = document.getElementById('global-input');
            if(!input.value.trim() || !myUid) return;
            push(ref(db, 'learningLibrary/boards/global'), {
                authorName: localPlayer.name, role: localPlayer.role, text: input.value.trim(), createdAt: Date.now()
            });
            input.value = '';
        };

        let currentActiveBench = null;
        window.sendLocalChat = function() {
            const input = document.getElementById('local-input');
            if(!input.value.trim() || !currentActiveBench) return;
            push(ref(db, `learningLibrary/boards/${currentActiveBench}`), {
                authorName: localPlayer.name, role: localPlayer.role, text: input.value.trim(), createdAt: Date.now()
            });
            input.value = '';
        };

        function renderChat(containerId, messagesObj) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            if(!messagesObj) return;
            
            const msgs = Object.values(messagesObj).sort((a, b) => a.createdAt - b.createdAt);
            // Only show last 20 messages
            msgs.slice(-20).forEach(msg => {
                const color = msg.role === 'teacher' ? '#fbbf24' : '#60a5fa';
                container.innerHTML += `<span><strong style="color:${color}">${msg.authorName}:</strong> ${msg.text}</span>`;
            });
            container.scrollTop = container.scrollHeight;
        }

        // Listen for Enter key on chats
        document.getElementById('global-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendGlobalChat(); });
        document.getElementById('local-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendLocalChat(); });

        // --- MOVEMENT & CONTROLS ---
        window.addEventListener('keydown', (e) => { keys[e.key] = true; if(e.key === ' ' || e.key === 'Enter') tryInteract(); });
        window.addEventListener('keyup', (e) => { keys[e.key] = false; });

        // Mobile Controls
        const bindBtn = (id, key) => {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
            btn.addEventListener('mousedown', (e) => { keys[key] = true; });
            btn.addEventListener('mouseup', (e) => { keys[key] = false; });
        };
        bindBtn('btn-up', 'ArrowUp'); bindBtn('btn-down', 'ArrowDown'); bindBtn('btn-left', 'ArrowLeft'); bindBtn('btn-right', 'ArrowRight');
        document.getElementById('btn-action').addEventListener('touchstart', (e) => { e.preventDefault(); tryInteract(); });
        document.getElementById('btn-action').addEventListener('mousedown', (e) => { tryInteract(); });

        let isSandboxOpen = false;

        function tryInteract() {
            if(isSandboxOpen) return;
            // Check distance to workbenches
            workbenches.forEach(bench => {
                let dx = Math.abs((localPlayer.x + 15) - (bench.x + 40));
                let dy = Math.abs((localPlayer.y + 15) - (bench.y + 30));
                if (dx < 60 && dy < 60) openSandbox(bench);
            });
        }

        let localChatListener = null;
        function openSandbox(bench) {
            isSandboxOpen = true;
            currentActiveBench = bench.id;
            document.getElementById('sandbox-modal').style.display = 'flex';
            document.getElementById('global-chat').style.display = 'none';
            document.querySelector('#sandbox-area h2').innerText = `${bench.label} - Sandbox`;

            // Listen to this specific bench's chat
            localChatListener = onValue(ref(db, `learningLibrary/boards/${bench.id}`), (snapshot) => {
                renderChat('local-messages', snapshot.val());
            });

            initManipulativeCanvas();
        }

        window.closeSandbox = function() {
            isSandboxOpen = false;
            currentActiveBench = null;
            document.getElementById('sandbox-modal').style.display = 'none';
            document.getElementById('global-chat').style.display = 'flex';
            if(localChatListener) localChatListener(); // Unsubscribe
        };

        // --- THE PHYSICS ENGINE (Game Loop) ---
        let lastFirebaseUpdate = 0;

        function update() {
            if (!gameActive || isSandboxOpen) return;

            let isMoving = false;
            if (keys.ArrowUp || keys.w) { localPlayer.y -= localPlayer.speed; isMoving = true; }
            if (keys.ArrowDown || keys.s) { localPlayer.y += localPlayer.speed; isMoving = true; }
            if (keys.ArrowLeft || keys.a) { localPlayer.x -= localPlayer.speed; isMoving = true; }
            if (keys.ArrowRight || keys.d) { localPlayer.x += localPlayer.speed; isMoving = true; }

            // Wall collisions
            if(localPlayer.x < 0) localPlayer.x = 0;
            if(localPlayer.y < 0) localPlayer.y = 0;
            if(localPlayer.x > 800 - localPlayer.width) localPlayer.x = 800 - localPlayer.width;
            if(localPlayer.y > 600 - localPlayer.height) localPlayer.y = 600 - localPlayer.height;

            // Sync to Firebase (throttled to 30fps to save database bandwidth)
            if (isMoving && myUid && Date.now() - lastFirebaseUpdate > 33) {
                set(ref(db, `learningLibrary/players/${myUid}`), localPlayer);
                lastFirebaseUpdate = Date.now();
            }

            // --- CALCULATE GIANT SEESAW TORQUE ---
            // Social Learning Mechanic: Player positions tilt the room's seesaw
            let totalTorque = 0;
            for(let id in players) {
                let p = players[id];
                // Check if player is standing on the seesaw area
                if(p.y > 240 && p.y < 360 && p.x > 200 && p.x < 600) {
                    // Distance from center (fulcrum). Left is negative, Right is positive.
                    let distance = (p.x + 15) - giantSeesaw.fulcrumX; 
                    totalTorque += distance; // Simplified torque (assuming equal weight)
                }
            }
            
            // Smoothly animate the tilt
            let targetTilt = totalTorque * 0.001; 
            // Clamp max tilt so it doesn't spin uncontrollably
            targetTilt = Math.max(-0.3, Math.min(0.3, targetTilt)); 
            giantSeesaw.tiltAngle += (targetTilt - giantSeesaw.tiltAngle) * 0.1;
        }

        function draw() {
            if(!gameActive) return;

            // Draw Floor
            ctx.fillStyle = "#1e293b"; 
            ctx.fillRect(0, 0, 800, 600);

            // Draw Grid Lines (Lab Feel)
            ctx.strokeStyle = "#334155";
            ctx.lineWidth = 1;
            for(let i=0; i<800; i+=50) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,600); ctx.stroke(); }
            for(let i=0; i<600; i+=50) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(800,i); ctx.stroke(); }

            // Draw Workbenches
            workbenches.forEach(bench => {
                ctx.fillStyle = bench.color;
                ctx.fillRect(bench.x, bench.y, bench.width, bench.height);
                ctx.fillStyle = "rgba(0,0,0,0.5)";
                ctx.fillRect(bench.x+5, bench.y+5, bench.width-10, bench.height-10); // inner shadow
                ctx.fillStyle = "white"; ctx.font = "12px Arial"; ctx.textAlign = "center";
                ctx.fillText("ACTION", bench.x + 40, bench.y + 75);
            });

            // Draw Giant Seesaw
            ctx.save();
            ctx.translate(giantSeesaw.fulcrumX, giantSeesaw.fulcrumY);
            
            // Fulcrum Base
            ctx.fillStyle = "#64748b";
            ctx.beginPath(); ctx.moveTo(0, -10); ctx.lineTo(-20, 30); ctx.lineTo(20, 30); ctx.fill();

            // The Rotating Plank
            ctx.rotate(giantSeesaw.tiltAngle);
            ctx.fillStyle = "#b45309"; // Wood color
            ctx.fillRect(-giantSeesaw.length/2, -15, giantSeesaw.length, 10);
            
            // Plank markings
            ctx.fillStyle = "rgba(255,255,255,0.2)";
            for(let i = -180; i <= 180; i+=60) { ctx.fillRect(i, -15, 2, 10); }
            ctx.restore();

            // Draw Text for Seesaw
            ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.font = "16px Arial"; ctx.textAlign = "center";
            ctx.fillText("The Group Balance Challenge", 400, 220);

            // Draw All Players
            for (let id in players) {
                let p = players[id];
                
                // Draw Avatar (Circle)
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x + 15, p.y + 15, 15, 0, Math.PI * 2);
                ctx.fill();

                // Teacher Star
                if(p.role === 'teacher') {
                    ctx.fillStyle = "#000"; ctx.font = "14px Arial"; ctx.fillText("⭐", p.x + 15, p.y + 20);
                }

                // Nametag
                ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
                ctx.fillRect(p.x - 10, p.y - 20, 50, 18);
                ctx.fillStyle = p.role === 'teacher' ? "#fbbf24" : "white"; 
                ctx.font = "12px Arial"; 
                ctx.fillText(p.name, p.x + 15, p.y - 7);
            }
        }

        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

        // --- THE SANDBOX MANIPULATIVE ENGINE ---
        // This runs inside the modal when a student interacts with a workbench
        const sCanvas = document.getElementById('sandbox-canvas');
        const sCtx = sCanvas.getContext('2d');
        
        // Manipulative Objects
        let sItems = [
            { id: "fulcrum", x: 225, y: 180, w: 40, h: 40, type: "triangle", color: "#64748b", dragging: false },
            { id: "load", x: 100, y: 150, w: 40, h: 40, type: "box", color: "#ef4444", dragging: false, label: "50kg" },
            { id: "effort", x: 350, y: 150, w: 40, h: 40, type: "hand", color: "#3b82f6", dragging: false, label: "Pull" }
        ];

        function initManipulativeCanvas() {
            drawSandbox();
        }

        function drawSandbox() {
            sCtx.clearRect(0, 0, sCanvas.width, sCanvas.height);

            // Draw background markings
            sCtx.strokeStyle = "#334155"; sCtx.lineWidth = 1;
            sCtx.beginPath(); sCtx.moveTo(50, 190); sCtx.lineTo(400, 190); sCtx.stroke(); // Ground line

            let fulcrum = sItems.find(i => i.id === "fulcrum");
            let load = sItems.find(i => i.id === "load");
            let effort = sItems.find(i => i.id === "effort");

            // --- LEVER LOGIC & MATH ---
            // Sort items by X position to determine Class
            let sorted = [fulcrum, load, effort].sort((a, b) => a.x - b.x);
            let middleItem = sorted[1].id;
            
            let leverClass = "";
            let feedback = "";
            let distLoad = Math.abs(load.x - fulcrum.x);
            let distEffort = Math.abs(effort.x - fulcrum.x);
            let mechAdvantage = distLoad === 0 ? 0 : distEffort / distLoad; // Torque ratio

            if (middleItem === "fulcrum") {
                leverClass = "Class 1 Lever (Seesaw / Crowbar)";
                feedback = mechAdvantage > 1 ? "FORCE ADVANTAGE! (Easy to lift)" : "SPEED ADVANTAGE! (Hard to lift, but moves fast)";
            } else if (middleItem === "load") {
                leverClass = "Class 2 Lever (Wheelbarrow)";
                feedback = "ALWAYS FORCE ADVANTAGE! (Load is closer to fulcrum)";
            } else if (middleItem === "effort") {
                leverClass = "Class 3 Lever (Fishing Rod / Tweezers)";
                feedback = "ALWAYS SPEED ADVANTAGE! (Effort moves a short distance, load moves far)";
            }

            // Update UI
            document.getElementById('sandbox-feedback').innerText = leverClass;
            document.getElementById('sandbox-advantage').innerText = feedback;

            // Calculate tilt purely for visual flair inside the sandbox
            let sTilt = 0;
            if(middleItem === "fulcrum") {
                let sTorque = (distEffort * -1) + (distLoad * 1.5); // fake weight ratio
                sTilt = (load.x < fulcrum.x) ? -sTorque * 0.001 : sTorque * 0.001;
                sTilt = Math.max(-0.2, Math.min(0.2, sTilt));
            } else {
                // Class 2 and 3 tilt up from the fulcrum
                sTilt = (fulcrum.x < 225) ? -0.1 : 0.1; 
            }

            // Draw Plank
            sCtx.save();
            sCtx.translate(fulcrum.x, fulcrum.y - 10);
            sCtx.rotate(sTilt);
            sCtx.fillStyle = "#b45309";
            // Plank goes from leftmost item to rightmost item
            let leftBound = sorted[0].x - fulcrum.x;
            let rightBound = sorted[2].x - fulcrum.x;
            sCtx.fillRect(leftBound - 20, -10, (rightBound - leftBound) + 40, 10);
            sCtx.restore();

            // Draw Items
            sItems.forEach(item => {
                sCtx.fillStyle = item.color;
                if(item.type === "box") {
                    sCtx.fillRect(item.x - 20, item.y - 20, item.w, item.h);
                    sCtx.fillStyle = "white"; sCtx.font = "12px Arial"; sCtx.fillText(item.label, item.x - 12, item.y + 5);
                } else if(item.type === "triangle") {
                    sCtx.beginPath(); sCtx.moveTo(item.x, item.y - 20); sCtx.lineTo(item.x - 20, item.y + 20); sCtx.lineTo(item.x + 20, item.y + 20); sCtx.fill();
                } else if(item.type === "hand") {
                    sCtx.beginPath(); sCtx.arc(item.x, item.y, 20, 0, Math.PI*2); sCtx.fill();
                    sCtx.fillStyle = "white"; sCtx.font = "12px Arial"; sCtx.fillText(item.label, item.x - 10, item.y + 4);
                }
            });
        }

        // Sandbox Drag & Drop Mouse Events
        let isDragging = false; let dragItem = null;

        function handlePointerDown(e) {
            let rect = sCanvas.getBoundingClientRect();
            let mouseX = e.clientX - rect.left; let mouseY = e.clientY - rect.top;
            if(e.touches) { mouseX = e.touches[0].clientX - rect.left; mouseY = e.touches[0].clientY - rect.top; }

            for (let i = sItems.length - 1; i >= 0; i--) {
                let it = sItems[i];
                if (mouseX > it.x - 20 && mouseX < it.x + 20 && mouseY > it.y - 20 && mouseY < it.y + 20) {
                    isDragging = true; dragItem = it; return;
                }
            }
        }

        function handlePointerMove(e) {
            if (!isDragging || !dragItem) return;
            let rect = sCanvas.getBoundingClientRect();
            let mouseX = e.clientX - rect.left;
            if(e.touches) mouseX = e.touches[0].clientX - rect.left;

            // Keep within bounds
            mouseX = Math.max(20, Math.min(mouseX, 430));
            dragItem.x = mouseX;
            drawSandbox();
        }

        function handlePointerUp() { isDragging = false; dragItem = null; }

        sCanvas.addEventListener('mousedown', handlePointerDown);
        sCanvas.addEventListener('mousemove', handlePointerMove);
        window.addEventListener('mouseup', handlePointerUp); // Catch outside releases
        sCanvas.addEventListener('touchstart', handlePointerDown);
        sCanvas.addEventListener('touchmove', handlePointerMove);
        window.addEventListener('touchend', handlePointerUp);

    </script>
</body>
</html>
