<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Lever Laboratory - Multiplayer</title>
    <style>
        /* --- CORE STYLES --- */
        body { margin: 0; padding: 0; background: #0f172a; display: flex; flex-direction: column; align-items: center; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        #game-container { position: relative; width: 800px; max-width: 100vw; height: 600px; max-height: 100vh; border: 4px solid #3b82f6; border-radius: 8px; overflow: hidden; background: #1e293b; box-shadow: 0 10px 30px rgba(0,0,0,0.8); margin-top: 10px; }
        canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }
        
        /* --- UI OVERLAYS --- */
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        #start-screen h1 { font-size: 32px; color: #60a5fa; margin-bottom: 10px; }
        #start-screen input { padding: 10px; font-size: 16px; border-radius: 5px; border: none; margin-bottom: 10px; width: 200px; text-align: center; }
        .btn { background: #3b82f6; color: white; padding: 10px 20px; font-size: 16px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 5px; transition: 0.2s; }
        .btn:hover { background: #2563eb; }
        .btn-teacher { background: #d97706; }
        .btn-teacher:hover { background: #b45309; }

        /* --- TEACHER CONTROL PANEL --- */
        #teacher-panel { display: none; position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); border: 2px solid #fbbf24; border-radius: 8px; padding: 10px; z-index: 40; text-align: center; }
        #teacher-panel h3 { margin: 0 0 10px 0; color: #fbbf24; font-size: 14px; text-transform: uppercase; }
        .t-btn { background: #475569; color: white; border: 1px solid #94a3b8; padding: 5px 10px; border-radius: 4px; cursor: pointer; margin: 0 5px; }
        .t-btn:hover { background: #64748b; }
        .t-btn.active { background: #10b981; border-color: #059669; font-weight: bold; }

        /* --- CHAT SYSTEMS --- */
        .chat-container { position: absolute; background: rgba(0,0,0,0.7); border-radius: 8px; display: flex; flex-direction: column; padding: 10px; box-sizing: border-box; transition: opacity 0.3s; }
        #global-chat { bottom: 10px; left: 10px; width: 260px; height: 130px; border: 1px solid #475569; z-index: 10; opacity: 0.8; }
        #global-chat:hover { opacity: 1; }
        .chat-messages { flex-grow: 1; overflow-y: auto; margin-bottom: 10px; font-size: 13px; display: flex; flex-direction: column; gap: 4px; }
        .chat-messages span { background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 4px; }
        .chat-input-row { display: flex; gap: 5px; }
        .chat-input-row input { flex-grow: 1; padding: 5px; border: none; border-radius: 4px; font-size: 12px; }
        .chat-input-row button { background: #10b981; border: none; color: white; border-radius: 4px; cursor: pointer; padding: 0 10px; font-size: 12px; }

        /* --- THE SANDBOX MODAL --- */
        #sandbox-modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 700px; height: 500px; background: #1e293b; border: 4px solid #64748b; border-radius: 12px; z-index: 50; display: none; flex-direction: row; box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
        #sandbox-area { flex: 2; padding: 20px; position: relative; }
        #sandbox-chat { flex: 1; border-left: 2px solid #334155; padding: 10px; display: flex; flex-direction: column; background: #0f172a; border-radius: 0 8px 8px 0; opacity: 1; }
        #sandbox-canvas { width: 100%; height: 250px; background: #0f172a; border-radius: 8px; border: 2px solid #475569; margin-top: 20px; cursor: grab; }
        .close-btn { position: absolute; top: 10px; right: 10px; background: #ef4444; border: none; color: white; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-weight: bold; }
        
        /* --- MOBILE CONTROLS --- */
        #mobile-controls { display: none; position: absolute; bottom: 20px; right: 20px; z-index: 20; }
        .d-pad { display: grid; grid-template-columns: repeat(3, 50px); grid-template-rows: repeat(3, 50px); gap: 5px; }
        .m-btn { background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.4); color: white; border-radius: 50%; font-size: 20px; display: flex; align-items: center; justify-content: center; user-select: none; }
        .m-btn:active { background: rgba(255,255,255,0.5); }
        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 3; }
        #btn-action { grid-column: 2; grid-row: 2; background: rgba(59, 130, 246, 0.5); font-size: 12px; border-radius: 10px; }
        
        @media (max-width: 768px) { #mobile-controls { display: block; } #global-chat { width: 200px; height: 110px; } }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>

        <div id="teacher-panel">
            <h3>Teacher Controls: Active Challenge</h3>
            <button class="t-btn active" id="btn-chal-1" onclick="setChallenge(1)">Class 1</button>
            <button class="t-btn" id="btn-chal-2" onclick="setChallenge(2)">Class 2</button>
            <button class="t-btn" id="btn-chal-3" onclick="setChallenge(3)">Class 3</button>
        </div>

        <div class="chat-container" id="global-chat">
            <div style="font-size: 11px; color: #94a3b8; font-weight: bold; margin-bottom: 5px;">Global Lab Chat</div>
            <div class="chat-messages" id="global-messages"></div>
            <div class="chat-input-row">
                <input type="text" id="global-input" placeholder="Say hello..." maxlength="60">
                <button onclick="sendGlobalChat()">Send</button>
            </div>
        </div>

        <div id="mobile-controls">
            <div class="d-pad">
                <div class="m-btn" id="btn-up">▲</div>
                <div class="m-btn" id="btn-left">◀</div>
                <div class="m-btn" id="btn-action">ACT</div>
                <div class="m-btn" id="btn-right">▶</div>
                <div class="m-btn" id="btn-down">▼</div>
            </div>
        </div>

        <div id="sandbox-modal">
            <button class="close-btn" onclick="closeSandbox()">X</button>
            <div id="sandbox-area">
                <h2 style="margin: 0; color: #38bdf8;">Manipulative Sandbox</h2>
                <p style="margin: 5px 0 0 0; font-size: 14px; color: #cbd5e1;">Drag the Fulcrum (▲), Load (⬛), and Effort (✋) to build different classes of levers.</p>
                <canvas id="sandbox-canvas" width="450" height="250"></canvas>
                <div id="sandbox-feedback" style="margin-top: 15px; font-size: 18px; font-weight: bold; color: #10b981;">Build a lever to see its class!</div>
                <div id="sandbox-advantage" style="margin-top: 5px; font-size: 14px; color: #fbbf24;"></div>
            </div>
            <div id="sandbox-chat">
                <div style="font-size: 14px; color: #94a3b8; font-weight: bold; margin-bottom: 5px;">Workbench Chat</div>
                <div class="chat-messages" id="local-messages"></div>
                <div class="chat-input-row">
                    <input type="text" id="local-input" placeholder="Discuss..." maxlength="60">
                    <button onclick="sendLocalChat()">Send</button>
                </div>
            </div>
        </div>

        <div id="start-screen">
            <h1>The Lever Laboratory</h1>
            <p style="margin-bottom: 20px; color: #94a3b8;">Explore, balance, and learn together.</p>
            <input type="text" id="player-name-input" placeholder="Enter your name..." maxlength="12">
            <div style="display: flex; gap: 10px;">
                <button class="btn" onclick="startGame('student')">Join as Student</button>
                <button class="btn btn-teacher" onclick="checkTeacherLogin()">Join as Teacher</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
        import { getDatabase, ref, set, onValue, push, onDisconnect } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBXgT_LxFUar6FcfFqKJsuY2YIOjG5JLtM",
            authDomain: "symmetry-and-nets.firebaseapp.com",
            databaseURL: "https://symmetry-and-nets-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "symmetry-and-nets",
            storageBucket: "symmetry-and-nets.firebasestorage.app",
            messagingSenderId: "250211420064",
            appId: "1:250211420064:web:fe4a064715042bedf546c5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // --- CORE GAME VARIABLES ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let gameActive = false;
        let myUid = null;
        let players = {};
        
        let localPlayer = { x: 400, y: 500, width: 30, height: 30, speed: 4, name: "Student", role: "student", color: "#3b82f6" };
        let keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, w: false, a: false, s: false, d: false };

        const workbenches = [
            { id: "bench1", x: 100, y: 100, width: 80, height: 60, color: "#8b5cf6", label: "Workbench A" },
            { id: "bench2", x: 620, y: 100, width: 80, height: 60, color: "#ec4899", label: "Workbench B" },
            { id: "bench3", x: 100, y: 400, width: 80, height: 60, color: "#14b8a6", label: "Workbench C" }
        ];

        // --- DYNAMIC CHALLENGE SYSTEM ---
        let currentChallengeId = 1;
        let giantLever = { fulcrumX: 400, loadX: 250, loadWeight: 500, name: "Class 1: The Seesaw", targetZones: [{min: 400, max: 700}] };

        const challengeData = {
            1: { fulcrumX: 400, loadX: 250, loadWeight: 500, name: "Class 1: Stand on the right to lift the Load!", targetZones: [{min: 400, max: 700}], blockZone: null },
            2: { fulcrumX: 150, loadX: 350, loadWeight: 1000, name: "Class 2: The Heavy Lift! Stand on the far right.", targetZones: [{min: 350, max: 700}], blockZone: null },
            3: { fulcrumX: 150, loadX: 650, loadWeight: 200, name: "Class 3: Speed Whip! You must stand in the middle.", targetZones: [{min: 150, max: 550}], blockZone: {min: 550, max: 700} }
        };

        window.setChallenge = function(id) {
            if(localPlayer.role !== 'teacher') return;
            set(ref(db, 'learningLibrary/roomMeta/activeChallenge'), id);
        };

        function updateChallengeUI(id) {
            currentChallengeId = id;
            giantLever = challengeData[id];
            // Update Teacher Buttons
            document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-chal-' + id).classList.add('active');
        }

        // --- INITIALIZATION & AUTH ---
        window.checkTeacherLogin = function() {
            const pass = prompt("Enter Teacher Password (hint: RSA):");
            if(pass === "IWS") startGame('teacher');
            else alert("Incorrect password.");
        };

        window.startGame = function(role) {
            let nameInput = document.getElementById('player-name-input').value.trim();
            if (nameInput !== "") localPlayer.name = nameInput;
            localPlayer.role = role;
            if(role === 'teacher') {
                localPlayer.color = "#fbbf24";
                document.getElementById('teacher-panel').style.display = 'block';
            }

            document.getElementById('start-screen').style.display = 'none';
            
            signInAnonymously(auth).then(() => {
                myUid = auth.currentUser.uid;
                const myRef = ref(db, `learningLibrary/players/${myUid}`);
                set(myRef, localPlayer);
                onDisconnect(myRef).remove();

                onValue(ref(db, 'learningLibrary/players'), (snapshot) => { players = snapshot.val() || {}; });
                onValue(ref(db, 'learningLibrary/boards/global'), (snapshot) => { renderChat('global-messages', snapshot.val()); });
                
                // Listen for Challenge Changes
                onValue(ref(db, 'learningLibrary/roomMeta/activeChallenge'), (snapshot) => { 
                    if(snapshot.exists()) updateChallengeUI(snapshot.val()); 
                });

                gameActive = true;
                gameLoop();
            });
        };

        // --- CHAT FUNCTIONS ---
        window.sendGlobalChat = function() {
            const input = document.getElementById('global-input');
            if(!input.value.trim() || !myUid) return;
            push(ref(db, 'learningLibrary/boards/global'), { authorName: localPlayer.name, role: localPlayer.role, text: input.value.trim(), createdAt: Date.now() });
            input.value = '';
        };

        let currentActiveBench = null;
        window.sendLocalChat = function() {
            const input = document.getElementById('local-input');
            if(!input.value.trim() || !currentActiveBench) return;
            push(ref(db, `learningLibrary/boards/${currentActiveBench}`), { authorName: localPlayer.name, role: localPlayer.role, text: input.value.trim(), createdAt: Date.now() });
            input.value = '';
        };

        function renderChat(containerId, messagesObj) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            if(!messagesObj) return;
            const msgs = Object.values(messagesObj).sort((a, b) => a.createdAt - b.createdAt);
            msgs.slice(-20).forEach(msg => {
                const color = msg.role === 'teacher' ? '#fbbf24' : '#60a5fa';
                container.innerHTML += `<span><strong style="color:${color}">${msg.authorName}:</strong> ${msg.text}</span>`;
            });
            container.scrollTop = container.scrollHeight;
        }

        document.getElementById('global-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendGlobalChat(); });
        document.getElementById('local-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendLocalChat(); });

        // --- MOVEMENT & CONTROLS ---
        window.addEventListener('keydown', (e) => { keys[e.key] = true; if(e.key === ' ' || e.key === 'Enter') tryInteract(); });
        window.addEventListener('keyup', (e) => { keys[e.key] = false; });

        const bindBtn = (id, key) => {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
            btn.addEventListener('mousedown', (e) => { keys[key] = true; });
            btn.addEventListener('mouseup', (e) => { keys[key] = false; });
        };
        bindBtn('btn-up', 'ArrowUp'); bindBtn('btn-down', 'ArrowDown'); bindBtn('btn-left', 'ArrowLeft'); bindBtn('btn-right', 'ArrowRight');
        document.getElementById('btn-action').addEventListener('touchstart', (e) => { e.preventDefault(); tryInteract(); });
        document.getElementById('btn-action').addEventListener('mousedown', (e) => { tryInteract(); });

        let isSandboxOpen = false;

        function tryInteract() {
            if(isSandboxOpen) return;
            workbenches.forEach(bench => {
                let dx = Math.abs((localPlayer.x + 15) - (bench.x + 40)); let dy = Math.abs((localPlayer.y + 15) - (bench.y + 30));
                if (dx < 60 && dy < 60) openSandbox(bench);
            });
        }

        let localChatListener = null;
        function openSandbox(bench) {
            isSandboxOpen = true; currentActiveBench = bench.id;
            document.getElementById('sandbox-modal').style.display = 'flex';
            document.getElementById('global-chat').style.display = 'none';
            document.querySelector('#sandbox-area h2').innerText = `${bench.label} - Sandbox`;
            localChatListener = onValue(ref(db, `learningLibrary/boards/${bench.id}`), (snapshot) => { renderChat('local-messages', snapshot.val()); });
            drawSandbox(); // Initial draw
        }

        window.closeSandbox = function() {
            isSandboxOpen = false; currentActiveBench = null;
            document.getElementById('sandbox-modal').style.display = 'none';
            document.getElementById('global-chat').style.display = 'flex';
            if(localChatListener) localChatListener(); 
        };

        // --- GAME LOOP & PHYSICS ---
        let lastFirebaseUpdate = 0;
        let animatedTilt = 0; 
        let currentLoadTorque = 0;
        let currentPlayerTorque = 0;

        function update() {
            if (!gameActive || isSandboxOpen) return;

            let prevX = localPlayer.x;
            let isMoving = false;
            if (keys.ArrowUp || keys.w) { localPlayer.y -= localPlayer.speed; isMoving = true; }
            if (keys.ArrowDown || keys.s) { localPlayer.y += localPlayer.speed; isMoving = true; }
            if (keys.ArrowLeft || keys.a) { localPlayer.x -= localPlayer.speed; isMoving = true; }
            if (keys.ArrowRight || keys.d) { localPlayer.x += localPlayer.speed; isMoving = true; }

            // Wall collisions
            if(localPlayer.x < 0) localPlayer.x = 0;
            if(localPlayer.y < 0) localPlayer.y = 0;
            if(localPlayer.x > 800 - localPlayer.width) localPlayer.x = 800 - localPlayer.width;
            if(localPlayer.y > 600 - localPlayer.height) localPlayer.y = 600 - localPlayer.height;

            // Block Zones (Used for Class 3 Challenge to stop students moving too far right)
            if (giantLever.blockZone) {
                let px = localPlayer.x + 15; // center
                let py = localPlayer.y + 30; // feet
                if (py > 250 && py < 350 && px > giantLever.blockZone.min && px < giantLever.blockZone.max) {
                    localPlayer.x = prevX; // Block movement
                }
            }

            if (isMoving && myUid && Date.now() - lastFirebaseUpdate > 33) {
                set(ref(db, `learningLibrary/players/${myUid}`), localPlayer);
                lastFirebaseUpdate = Date.now();
            }

            // --- CALCULATE DYNAMIC MULTIPLAYER TORQUE ---
            // Load Torque: Weight * Distance from fulcrum
            let loadDistance = Math.abs(giantLever.loadX - giantLever.fulcrumX);
            currentLoadTorque = giantLever.loadWeight * loadDistance;

            // Player Torque
            currentPlayerTorque = 0;
            for(let id in players) {
                let p = players[id];
                let px = p.x + 15; let py = p.y + 30; // Avatar feet
                // Check if standing on the interactive part of the plank (Y: 250 to 350)
                if(py > 250 && py < 350) {
                    // Check if they are in the valid effort zone for this challenge
                    let validZone = false;
                    giantLever.targetZones.forEach(zone => { if(px >= zone.min && px <= zone.max) validZone = true; });
                    
                    if(validZone) {
                        let playerDistance = Math.abs(px - giantLever.fulcrumX);
                        currentPlayerTorque += (50 * playerDistance); // Assume each student applies 50kg force
                    }
                }
            }

            // --- LOGIC FIX: Animate Plank Tilt Based on Torque War ---
            // Determine which side of the fulcrum the load is resting on
            let loadIsOnLeft = giantLever.loadX < giantLever.fulcrumX;
            
            // If load is on the left, gravity pulls the left side down (negative rotation)
            // If load is on the right, gravity pulls the right side down (positive rotation)
            let restingTilt = loadIsOnLeft ? -0.2 : 0.2;
            let liftedTilt = loadIsOnLeft ? 0.1 : -0.1;

            let targetTilt = restingTilt;
            if (currentPlayerTorque >= currentLoadTorque && currentLoadTorque > 0) {
                targetTilt = liftedTilt; // Successfully lifted!
            }
            
            // Smoothly animate towards the target tilt
            animatedTilt += (targetTilt - animatedTilt) * 0.1;
        }

        function draw() {
            if(!gameActive) return;

            // Draw Lab Environment
            ctx.fillStyle = "#1e293b"; ctx.fillRect(0, 0, 800, 600);
            ctx.strokeStyle = "#334155"; ctx.lineWidth = 1;
            for(let i=0; i<800; i+=50) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,600); ctx.stroke(); }
            for(let i=0; i<600; i+=50) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(800,i); ctx.stroke(); }

            // Draw Workbenches
            workbenches.forEach(bench => {
                ctx.fillStyle = bench.color; ctx.fillRect(bench.x, bench.y, bench.width, bench.height);
                ctx.fillStyle = "white"; ctx.font = "12px Arial"; ctx.textAlign = "center"; ctx.fillText("ACTION", bench.x + 40, bench.y + 75);
            });

            // --- DRAW GIANT LEVER CHALLENGE ---
            // Title
            ctx.fillStyle = "#fff"; ctx.font = "bold 20px Arial"; ctx.textAlign = "center";
            ctx.fillText(giantLever.name, 400, 200);

            // Barrier for Class 3
            if(giantLever.blockZone) {
                ctx.fillStyle = "rgba(239, 68, 68, 0.3)";
                ctx.fillRect(giantLever.blockZone.min, 250, giantLever.blockZone.max - giantLever.blockZone.min, 100);
                ctx.fillStyle = "#ef4444"; ctx.font = "14px Arial";
                ctx.fillText("LOCKED ZONE", giantLever.blockZone.min + 50, 300);
            }

            ctx.save();
            ctx.translate(giantLever.fulcrumX, 300);
            
            // Fulcrum Base
            ctx.fillStyle = "#64748b";
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-20, 40); ctx.lineTo(20, 40); ctx.fill();

            // The Rotating Plank
            ctx.rotate(animatedTilt);
            ctx.fillStyle = "#b45309"; 
            
            // Determine plank length dynamically based on challenge setup
            let plankStart = Math.min(0, giantLever.loadX - giantLever.fulcrumX) - 20;
            let plankEnd = Math.max(0, 700 - giantLever.fulcrumX); 
            ctx.fillRect(plankStart, -10, plankEnd - plankStart, 10);
            
            // Draw Load (Boulder)
            let loadRelX = giantLever.loadX - giantLever.fulcrumX;
            ctx.fillStyle = "#475569";
            ctx.fillRect(loadRelX - 25, -50, 50, 40);
            ctx.fillStyle = "#ef4444"; ctx.font = "bold 14px Arial"; ctx.textAlign = "center";
            ctx.fillText(giantLever.loadWeight + "kg", loadRelX, -25);

            ctx.restore();

            // Draw HUD Torque Meter
            ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(200, 360, 400, 40);
            ctx.fillStyle = "#ef4444"; ctx.fillRect(205, 365, 195, 30); // Load Bar
            
            let forceRatio = Math.min(1, currentPlayerTorque / currentLoadTorque) || 0;
            ctx.fillStyle = forceRatio >= 1 ? "#10b981" : "#3b82f6"; 
            ctx.fillRect(400, 365, 195 * forceRatio, 30); // Player Bar

            ctx.fillStyle = "white"; ctx.font = "12px Arial"; ctx.textAlign = "left";
            ctx.fillText("Load Torque: " + currentLoadTorque, 210, 385);
            ctx.textAlign = "right";
            ctx.fillText("Class Force: " + currentPlayerTorque, 590, 385);

            // Draw Players
            for (let id in players) {
                let p = players[id];
                ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x + 15, p.y + 15, 15, 0, Math.PI * 2); ctx.fill();
                if(p.role === 'teacher') { ctx.fillStyle = "#000"; ctx.font = "14px Arial"; ctx.textAlign = "center"; ctx.fillText("⭐", p.x + 15, p.y + 20); }
                ctx.fillStyle = "rgba(0, 0, 0, 0.7)"; ctx.fillRect(p.x - 10, p.y - 20, 50, 18);
                ctx.fillStyle = p.role === 'teacher' ? "#fbbf24" : "white"; ctx.font = "12px Arial"; ctx.textAlign = "center"; ctx.fillText(p.name, p.x + 15, p.y - 7);
            }
        }

        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

        // --- THE SANDBOX MANIPULATIVE ENGINE ---
        const sCanvas = document.getElementById('sandbox-canvas');
        const sCtx = sCanvas.getContext('2d');
        let sItems = [
            { id: "fulcrum", x: 225, y: 180, w: 40, h: 40, type: "triangle", color: "#64748b", dragging: false },
            { id: "load", x: 100, y: 150, w: 40, h: 40, type: "box", color: "#ef4444", dragging: false, label: "50kg" },
            { id: "effort", x: 350, y: 150, w: 40, h: 40, type: "hand", color: "#3b82f6", dragging: false, label: "Pull" }
        ];

        function drawSandbox() {
            sCtx.clearRect(0, 0, sCanvas.width, sCanvas.height);
            sCtx.strokeStyle = "#334155"; sCtx.lineWidth = 1; sCtx.beginPath(); sCtx.moveTo(50, 190); sCtx.lineTo(400, 190); sCtx.stroke(); 

            let fulcrum = sItems.find(i => i.id === "fulcrum");
            let load = sItems.find(i => i.id === "load");
            let effort = sItems.find(i => i.id === "effort");

            let sorted = [fulcrum, load, effort].sort((a, b) => a.x - b.x);
            let middleItem = sorted[1].id;
            let leverClass = ""; let feedback = "";
            let distLoad = Math.abs(load.x - fulcrum.x); let distEffort = Math.abs(effort.x - fulcrum.x);
            let mechAdvantage = distLoad === 0 ? 0 : distEffort / distLoad; 

            if (middleItem === "fulcrum") {
                leverClass = "Class 1 Lever (Seesaw / Crowbar)";
                feedback = mechAdvantage > 1 ? "FORCE ADVANTAGE! (Easy to lift)" : "SPEED ADVANTAGE! (Hard to lift, but moves fast)";
            } else if (middleItem === "load") {
                leverClass = "Class 2 Lever (Wheelbarrow)";
                feedback = "ALWAYS FORCE ADVANTAGE! (Load is closer to fulcrum)";
            } else if (middleItem === "effort") {
                leverClass = "Class 3 Lever (Fishing Rod / Tweezers)";
                feedback = "ALWAYS SPEED ADVANTAGE! (Effort moves a short distance, load moves far)";
            }

            document.getElementById('sandbox-feedback').innerText = leverClass;
            document.getElementById('sandbox-advantage').innerText = feedback;

            let sTilt = 0;
            if(middleItem === "fulcrum") {
                let sTorque = (distEffort * -1) + (distLoad * 1.5); 
                sTilt = (load.x < fulcrum.x) ? -sTorque * 0.001 : sTorque * 0.001;
                sTilt = Math.max(-0.2, Math.min(0.2, sTilt));
            } else { sTilt = (fulcrum.x < 225) ? -0.1 : 0.1; }

            sCtx.save();
            sCtx.translate(fulcrum.x, fulcrum.y - 10);
            sCtx.rotate(sTilt);
            sCtx.fillStyle = "#b45309";
            let leftBound = sorted[0].x - fulcrum.x; let rightBound = sorted[2].x - fulcrum.x;
            sCtx.fillRect(leftBound - 20, -10, (rightBound - leftBound) + 40, 10);
            sCtx.restore();

            sItems.forEach(item => {
                sCtx.fillStyle = item.color;
                if(item.type === "box") {
                    sCtx.fillRect(item.x - 20, item.y - 20, item.w, item.h);
                    sCtx.fillStyle = "white"; sCtx.font = "12px Arial"; sCtx.fillText(item.label, item.x - 12, item.y + 5);
                } else if(item.type === "triangle") {
                    sCtx.beginPath(); sCtx.moveTo(item.x, item.y - 20); sCtx.lineTo(item.x - 20, item.y + 20); sCtx.lineTo(item.x + 20, item.y + 20); sCtx.fill();
                } else if(item.type === "hand") {
                    sCtx.beginPath(); sCtx.arc(item.x, item.y, 20, 0, Math.PI*2); sCtx.fill();
                    sCtx.fillStyle = "white"; sCtx.font = "12px Arial"; sCtx.fillText(item.label, item.x - 10, item.y + 4);
                }
            });
        }

        let isDragging = false; let dragItem = null;
        function handlePointerDown(e) {
            let rect = sCanvas.getBoundingClientRect();
            let mouseX = e.clientX - rect.left; let mouseY = e.clientY - rect.top;
            if(e.touches) { mouseX = e.touches[0].clientX - rect.left; mouseY = e.touches[0].clientY - rect.top; }
            for (let i = sItems.length - 1; i >= 0; i--) {
                let it = sItems[i];
                if (mouseX > it.x - 20 && mouseX < it.x + 20 && mouseY > it.y - 20 && mouseY < it.y + 20) {
                    isDragging = true; dragItem = it; return;
                }
            }
        }

        function handlePointerMove(e) {
            if (!isDragging || !dragItem) return;
            let rect = sCanvas.getBoundingClientRect();
            let mouseX = e.clientX - rect.left;
            if(e.touches) mouseX = e.touches[0].clientX - rect.left;
            mouseX = Math.max(20, Math.min(mouseX, 430));
            dragItem.x = mouseX;
            drawSandbox();
        }
        function handlePointerUp() { isDragging = false; dragItem = null; }

        sCanvas.addEventListener('mousedown', handlePointerDown); sCanvas.addEventListener('mousemove', handlePointerMove);
        window.addEventListener('mouseup', handlePointerUp); sCanvas.addEventListener('touchstart', handlePointerDown);
        sCanvas.addEventListener('touchmove', handlePointerMove); window.addEventListener('touchend', handlePointerUp);

    </script>
</body>
</html>
